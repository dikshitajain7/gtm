<html>
<head>

    <title>Product</title>
    <style>
        body {
            font-family: 'Poppins';
            margin: 0;
            background: linear-gradient(to right, #ffecd2, #fcb69f);
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            display: flex;
            gap: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        img {
            width: 250px;
            border-radius: 10px;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        input, textarea {
            margin: 8px 0;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            background: black;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-KSVN3JLJ"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
<!-- End Google Tag Manager (noscript) -->

<div class="container">
    <div class="box">

        <img src="https://images.unsplash.com/photo-1523381210434-271e8be1f52b">

        <form action="thankyou.html" method="GET">
            <h2 id="productName"></h2>
            <p>Price: ₹999</p>

            <input type="text" name="name" placeholder="Full Name" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="tel" name="phone" placeholder="Phone Number" required>
            <textarea name="address" placeholder="Address" required></textarea>

            <input type="hidden" name="product" id="productInput">

            <button type="submit">Buy Now</button>
        </form>

    </div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const item = params.get("item");

    document.getElementById("productName").innerText = item;
    document.getElementById("productInput").value = item;
</script>

</body>
</html>
